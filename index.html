<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ГЕККО І КО — Система заявок</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2F7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:32px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.08)}
.logo{font-size:56px;margin-bottom:12px}
h1{font-size:22px;font-weight:700;color:#1C1C1E;margin-bottom:6px}
.sub{font-size:14px;color:#8E8E93;margin-bottom:32px}
.btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 20px;border-radius:14px;text-decoration:none;margin-bottom:12px;text-align:left;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn-admin{background:#185FA5;color:#fff}
.btn-executor{background:#EAF3DE;color:#3B6D11}
.btn-icon{font-size:28px;flex-shrink:0}
.btn-label{font-size:16px;font-weight:600}
.btn-desc{font-size:12px;opacity:0.8;margin-top:2px}
.footer{margin-top:24px;font-size:11px;color:#C7C7CC}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📋</div>
  <h1>ГЕККО І КО</h1>
  <p class="sub">Система управління заявками</p>

  <a href="admin.html" class="btn btn-admin">
    <span class="btn-icon">🖥️</span>
    <div>
      <div class="btn-label">Панель диспетчера</div>
      <div class="btn-desc">Імпорт xls, призначення заявок</div>
    </div>
  </a>

  <a href="executor.html" class="btn btn-executor">
    <span class="btn-icon">📱</span>
    <div>
      <div class="btn-label">Мобільний додаток</div>
      <div class="btn-desc">Для виконавців — мої заявки</div>
    </div>
  </a>

  <div class="footer">ГЕККО І КО © 2026</div>
</div>
</body>
</html>
